{
  "rules": {
    "meta_chapter_markers": {
      "enabled": true
    },
    "not_x_but_y": {
      "enabled": true,
      "warn_threshold": 3,
      "error_threshold": 999,
      "dynamic_scaling": true,
      "_iter023_note": "iter 023 P8 实测：江南龙族原作大量使用 '不是X是Y' 句式（是作者特征），而 deepseek 在写戏剧场景时也合理使用。lint cascade 之前把合法风格当 AI 痕迹打。改为 warning-only（error_threshold 设极高 999），让 reviewer 8-agent + KB+原文对照判断是否真的过度使用。warn_threshold 保留 3 以便 reviewer 看到次数信号。"
    },
    "short_sentence_openings": {
      "enabled": true,
      "threshold": 3,
      "window": 7
    },
    "name_drift": {
      "enabled": true,
      "disallowed_terms": [
        {
          "wrong": "上彬绘梨衣",
          "correct": "上杉绘梨衣"
        },
        {
          "wrong": "凯撒",
          "correct": "恺撒"
        },
        {
          "wrong": "路鸣非",
          "correct": "路明非"
        }
      ]
    },
    "ai_cliche_terms": {
      "enabled": true,
      "terms": [
        "命运的齿轮",
        "无声地诉说",
        "仿佛在诉说",
        "宿命感",
        "内心深处涌起",
        "这一刻他终于明白"
      ]
    },
    "short_chapter_length": {
      "enabled": true
    }
  }
}
